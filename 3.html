<!-- insialize 2 variable and increement both the variables each time and addition of both and interval of the 1 sec  -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
 </head>
 <body>
    <button onclick="stop()">Stop</button>
    <p id="p"></p>
    <script>
        let a=2,b=5;
       test= setInterval (function(){
            document.getElementById("p").innerHTML=++a+ ++b;
        },1000)

      function stop(){
          clearInterval(test)
      }
    </script>
 </body>
 </html>
